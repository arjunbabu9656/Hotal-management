{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Login - HotelFood{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-75 animate-fade-in px-3">
    <div class="col-md-5 col-lg-4">
        <div class="glass-panel p-4 p-md-5 mt-4 mt-md-5 shadow-lg">
            <div class="text-center mb-4 mb-md-5">
                <div class="bg-primary bg-opacity-10 d-inline-flex p-3 rounded-4 mb-3 mb-md-4">
                    <i class="fas fa-hotel fa-2x fa-md-3x text-primary"></i>
                </div>
                <h2 class="fw-bold text-dark">Welcome Back</h2>
                <p class="text-muted small">Enter your credentials to access the portal</p>
            </div>
            
            <form method="post" class="mt-4">
                {% csrf_token %}
                <div class="mb-4 authentication-form">
                    {{ form|crispy }}
                </div>
                <div class="d-grid gap-2 mt-4 mt-md-5">
                    <button type="submit" class="btn btn-premium btn-lg w-100 justify-content-center py-2 py-md-3">
                        <i class="fas fa-sign-in-alt me-2"></i> Sign In to Portal
                    </button>
                </div>
            </form>
            
            <div class="text-center mt-4 mt-md-5 pt-3 border-top border-light">
                <p class="mb-0 text-muted small">New here? <a href="{% url 'accounts:register' %}" class="text-primary fw-bold text-decoration-none">Create a Guest Account</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
