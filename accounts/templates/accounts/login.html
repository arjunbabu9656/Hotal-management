{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Login - Mallu Resturant{% endblock %}

{% block content %}
<div class="animate-fade-in p-2">
    <div class="auth-card glass-panel shadow-lg">
        <div class="text-center mb-4">
            <div class="bg-primary bg-opacity-10 d-inline-flex p-3 rounded-4 mb-3">
                <i class="fas fa-utensils fa-2x text-primary"></i>
            </div>
            <h2 class="fw-bold text-dark">Mallu Resturant</h2>
            <p class="text-muted small">Enter your credentials to access the portal</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            <div class="authentication-form">
                {{ form|crispy }}
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-premium btn-submit">
                    <i class="fas fa-sign-in-alt me-2"></i> Sign In
                </button>
            </div>
        </form>
        
        <div class="text-center mt-4 pt-3 border-top border-light">
            <p class="mb-0 text-muted extra-small">New here? <a href="{% url 'accounts:register' %}" class="text-primary fw-bold text-decoration-none">Create a Guest Account</a></p>
        </div>
    </div>
</div>
{% endblock %}
