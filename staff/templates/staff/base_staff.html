<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard - HotelFood</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <style>
        .navbar-kitchen { 
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .card-order { 
            border: none;
            border-left: 6px solid var(--primary); 
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-soft);
        }
        .age-red { color: var(--danger); font-weight: 700; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg glass-panel sticky-top mx-3 mt-3 rounded-pill shadow-sm border-0 bg-white bg-opacity-75">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="/">
                <div class="bg-success rounded-circle p-1 me-2 d-inline-flex">
                    <i class="fas fa-utensils text-white small"></i>
                </div>
                <span class="tracking-tight text-dark">Kitchen<span class="text-success">Portal</span></span>
            </a>
            <div class="ms-auto d-flex align-items-center">
                <div class="dropdown">
                    <button class="btn btn-light rounded-pill border px-4 shadow-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        <i class="fas fa-user-chef me-2 text-success"></i> {{ user.username }}
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg rounded-4 mt-3">
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item py-2 text-danger fw-medium" href="{% url 'accounts:logout' %}"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        <div class="row mb-3">
            <div class="col">
                <ul class="nav nav-pills">
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" href="{% url 'staff:dashboard' %}">Active Orders</a>
                    </li>
                </ul>
            </div>
        </div>

        {% block content %}{% endblock %}
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast-item glass-panel mb-2 p-3 border-start border-4 border-${type} shadow-lg`;
            toast.style.minWidth = '280px';
            
            let icon = 'info-circle';
            let color = 'var(--primary)';
            if(type === 'success') { icon = 'check-circle'; color = 'var(--secondary)'; }
            if(type === 'danger') { icon = 'exclamation-circle'; color = 'var(--danger)'; }
            if(type === 'warning') { icon = 'exclamation-triangle'; color = 'var(--accent)'; }

            toast.innerHTML = `
                <div class="d-flex align-items-center">
                    <div class="bg-${type} bg-opacity-10 p-2 rounded-circle me-3">
                        <i class="fas fa-${icon}" style="color: ${color};"></i>
                    </div>
                    <div class="fw-medium text-dark flex-grow-1">${message}</div>
                </div>
            `;
            container.appendChild(toast);
            
            // Trigger animation on next frame
            requestAnimationFrame(() => {
                toast.classList.add('show');
            });
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400); // Wait for transition
            }, 5000);
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
