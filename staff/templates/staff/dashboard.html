{% extends "staff/base_staff.html" %}

{% block content %}
<div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center mb-4 gap-3">
    <div class="d-flex align-items-center flex-wrap gap-2">
        <h2 class="fw-bold mb-0 me-sm-3">Active Guest Orders</h2>
    </div>
    <div class="text-muted small">
        <i class="fas fa-sync-alt fa-spin me-1"></i> Syncing...
    </div>
</div>

<div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4" id="orders-container">
    {% for order in orders %}
        {% include "staff/partials/order_card.html" with order=order %}
    {% empty %}
    <div class="col-12 text-center py-5">
        <div class="display-1 text-muted opacity-25 mb-4 animate-bounce"><i class="fas fa-check-circle"></i></div>
        <h3 class="fw-bold">No active guest orders</h3>
        <p class="text-muted">Take a break! You're all caught up for now.</p>
    </div>
    {% endfor %}
</div>

{% endblock %}
